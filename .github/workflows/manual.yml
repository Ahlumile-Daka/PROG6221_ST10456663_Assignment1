name: Build and Test Cybersecurity Chatbot

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Person to greet'
        default: 'World'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build project
      run: dotnet build --configuration Release --no-restore
    
    - name: Run application
      run: echo "Hello ${{ inputs.name }} - Cybersecurity Awareness Chatbot built successfully!"
    
    - name: Display build info
      run: |
        echo "Build completed for:"
        echo "Project: CyberSecurity_Awareness_Chatbot"
        echo "Framework: net8.0"
        echo "User greeting: ${{ inputs.name }}"
